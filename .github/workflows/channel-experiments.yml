name: Channel Experiments

on:
  push:
    paths:
      - 'scripts/channel-experiments/**'
  workflow_dispatch:

jobs:
  run-experiments:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy scipy mpmath matplotlib scikit-image
          pip install qiskit qiskit-aer || echo "Qiskit unavailable, Exp C skips quantum sim"

      - name: Run experiments A, C, D (fast)
        working-directory: scripts/channel-experiments
        run: |
          mkdir -p ../../results/channel-experiments
          python run_all.py --skip b 2>&1 | tee ../../results/channel-experiments/run_log.txt

      - name: Run experiment B (reduced grid for CI)
        working-directory: scripts/channel-experiments
        env:
          EXP_B_GRID_SIZE: "1000"
        run: |
          python run_all.py --only b 2>&1 | tee -a ../../results/channel-experiments/run_log.txt
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: channel-experiment-results
          path: results/channel-experiments/
          retention-days: 90

      - name: Summary
        run: |
          echo "## Channel Experiment Results" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat results/channel-experiments/run_summary.json >> $GITHUB_STEP_SUMMARY || echo "No summary generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
